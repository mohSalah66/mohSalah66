name: Daily Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # 1. Base Metrics & Habits (These are stable)
      - name: Base & Habits
        uses: lowlighter/metrics@v3.20
        with:
          filename: res/metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, repositories, activity, community, metadata
          plugin_habits: yes
          plugin_habits_days: 30
          plugin_habits_charts: yes
          config_timezone: Africa/Cairo

      # 2. Languages (Using @master to bypass the 'author' bug)
      - name: Languages
        uses: lowlighter/metrics@master
        continue-on-error: true # Prevents the whole workflow from red-lining if this still fails
        with:
          filename: res/languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_details: percentage, lines
          plugin_languages_sections: most-used # Removed recently-used temporarily to stabilize
          plugin_languages_limit: 8
          config_timezone: Africa/Cairo

      # 3. DevCard
      - name: Generate DevCard
        uses: dailydotdev/action-devcard@2.0.5
        with:
          devcard_id: ${{ secrets.DEVCARD_ID }}
          commit_filename: res/devcard.svg

      # 4. Snake Animation
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: mohSalah66
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 5. Push All Assets
      - name: Push Assets
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}