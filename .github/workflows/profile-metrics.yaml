name: Daily Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # 1. Base Metrics (Stable)
      - name: General Metrics
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, repositories, activity, community, metadata
          config_timezone: Africa/Cairo

      # 2. Languages (The step causing the TypeError)
      - name: Languages
        uses: lowlighter/metrics@latest
        continue-on-error: true # CRITICAL: This allows the job to continue even if it crashes
        with:
          filename: languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_details: percentage, lines
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          config_timezone: Africa/Cairo

      # 3. DevCard
      - name: Generate DevCard
        uses: dailydotdev/action-devcard@2.0.5
        continue-on-error: true
        with:
          devcard_id: ${{ secrets.DEVCARD_ID }}
          commit_filename: devcard.svg

      # 4. Snake Animation
      - name: Generate Snake
        uses: Platane/snk@v3
        continue-on-error: true
        with:
          github_user_name: mohSalah66
          outputs: |
            github-contribution-grid-snake.svg
            github-contribution-grid-snake-dark.svg?palette=github-dark

      # 5. Deployment Step
      - name: Prepare Assets
        run: |
          mkdir -p dist/res
          # Move whatever SVGs WERE successfully generated
          mv *.svg dist/res/ 2>/dev/null || true
      
      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}