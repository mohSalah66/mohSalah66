name: Daily Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # 1. Main Metrics: Combined for efficiency to prevent API rate limiting
      - name: General & Language Metrics
        uses: lowlighter/metrics@v3.20
        with:
          filename: res/metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, repositories, activity, community, metadata
          # Languages Plugin (Consolidated Recent + Detailed)
          plugin_languages: yes
          plugin_languages_details: percentage, lines
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          # Habits Plugin
          plugin_habits: yes
          plugin_habits_days: 30
          plugin_habits_charts: yes
          config_timezone: Africa/Cairo

      # 2. DevCard: Separate as it uses a different action
      - name: Generate DevCard
        uses: dailydotdev/action-devcard@2.0.5
        with:
          devcard_id: ${{ secrets.DEVCARD_ID }}
          commit_filename: res/devcard.svg

      # 3. Snake: The classic contribution visualization
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: mohSalah66
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 4. Deployment: Push everything to the output branch
      - name: Push Assets
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
          # If you want to keep the metrics in 'res/', 
          # make sure they are moved to the 'dist' folder before this step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}