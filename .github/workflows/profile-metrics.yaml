name: Daily Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Profile Overview
        uses: lowlighter/metrics@v3.20
        with:
          filename: res/profile.overview.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: mohsalah66
          base: header, repositories, activity, community, metadata
          plugin_lines: yes
          repositories: 1000
          config_timezone: Africa/Cairo

      - name: Generate Habits
        uses: lowlighter/metrics@v3.20
        with:
          filename: res/habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_habits: yes
          plugin_habits_days: 30
          plugin_habits_charts: yes
          config_timezone: Africa/Cairo

      - name: Generate Languages Details
        uses: lowlighter/metrics@v3.20
        with:
          filename: res/languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_details: percentage, lines
          plugin_languages_limit: 8
          config_timezone: Africa/Cairo

      - name: Generate Recent Languages
        uses: lowlighter/metrics@v3.20
        with:
          filename: res/languages.recent.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_sections: recently-used
          plugin_languages_limit: 8
          config_timezone: Africa/Cairo

  devcard:
    runs-on: ubuntu-latest
    steps:
      - name: Generate DevCard
        uses: dailydotdev/action-devcard@2.0.5
        with:
          devcard_id: ${{ secrets.DEVCARD_ID }}
          commit_filename: res/devcard.svg

  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: mohSalah66
          outputs: dist/github-contribution-grid-snake.svg

      - name: Push Snake
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}