name: Daily Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # 1. Base Metrics & Habits
      - name: Base & Habits
        uses: lowlighter/metrics@v3.20
        with:
          filename: metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, repositories, activity, community, metadata
          plugin_habits: yes
          plugin_habits_days: 30
          plugin_habits_charts: yes
          config_timezone: Africa/Cairo

      # 2. Languages (Using @master to bypass the 'author' bug)
      - name: Languages
        uses: lowlighter/metrics@master
        continue-on-error: true 
        with:
          filename: languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_details: percentage, lines
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          config_timezone: Africa/Cairo

      # 3. DevCard
      - name: Generate DevCard
        uses: dailydotdev/action-devcard@2.0.5
        with:
          devcard_id: ${{ secrets.DEVCARD_ID }}
          commit_filename: devcard.svg

      # 4. Snake Animation
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: mohSalah66
          outputs: |
            github-contribution-grid-snake.svg
            github-contribution-grid-snake-dark.svg?palette=github-dark

      # 5. Move all generated SVGs to the deployment folder
      - name: Prepare Assets
        run: |
          mkdir -p dist/res
          mv *.svg dist/res/ 2>/dev/null || true

      # 6. Push All Assets to 'output' branch
      - name: Push Assets
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}